name: CI

on:
  push:
    branches: ["**"]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  api:
    name: API — tests + lint + evals
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install API dev deps
        working-directory: services/api
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt

      - name: Lint (ruff)
        working-directory: services/api
        run: ruff check app

      - name: Unit tests
        working-directory: services/api
        env:
          MEMORYOPS_STORAGE: memory
        run: pytest -q

      - name: Eval harness (invariants)
        env:
          MEMORYOPS_STORAGE: memory
        run: python evals/run_evals.py

  postgres-rls:
    name: DB — enforced RLS on real Postgres + pgvector
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: memoryops
          POSTGRES_PASSWORD: memoryops
          POSTGRES_DB: memoryops
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U memoryops"
          --health-interval 5s --health-timeout 5s --health-retries 10
    env:
      DATABASE_URL: postgresql+psycopg://memoryops:memoryops@localhost:5432/memoryops
      PGPASSWORD: memoryops
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install API dev deps (+ Postgres extras)
        working-directory: services/api
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt -r requirements-postgres.txt

      - name: Apply migrations
        run: |
          for f in infra/db/migrations/*.sql; do
            echo "-- applying $f"
            psql -h localhost -U memoryops -d memoryops -v ON_ERROR_STOP=1 -f "$f"
          done

      # RLS is meaningful only on real Postgres — the in-memory backend simulates
      # it. These tests apply the migrations, seed two tenants, and prove the
      # FORCEd row-level security policies (migration 004) block cross-tenant reads
      # at the database layer. pgvector is exercised via the Vector(1536) columns.
      - name: Enforced Row-Level Security tests (real Postgres + pgvector)
        working-directory: services/api
        run: pytest -q tests/test_rls.py

      - name: Verify RLS policies are FORCEd on every tenant-scoped table
        run: python scripts/check_rls_policies.py

  # The memory-governance benchmark runs in its own workflow (benchmark.yml) so it
  # has a dedicated status badge; it is not duplicated here.
  #
  # NOTE: the full application test suite + eval harness run on the in-memory backend
  # (the `api` job above). They do not yet run against Postgres because the ORM types
  # tenant_id/user_id as String while migration 002 types them as uuid, so the app
  # path with the string tenant ids used throughout the tests/evals cannot insert into
  # the migrated schema. Reconciling that (schema + fixtures) is tracked as P1 work;
  # until then this job proves the database-layer RLS guarantee on the real stack
  # rather than overclaiming a full Postgres run.

  sdk:
    name: SDK — tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install deps (API for the in-process e2e fixture + SDK)
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r services/api/requirements.txt
          python -m pip install pytest httpx
          python -m pip install -e packages/memoryops-sdk

      - name: SDK tests
        working-directory: packages/memoryops-sdk
        env:
          MEMORYOPS_STORAGE: memory
          PYTHONPATH: ${{ github.workspace }}/services/api
        run: pytest -q

  web:
    name: Web — build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Install
        working-directory: apps/web
        run: npm ci || npm install

      - name: Build
        working-directory: apps/web
        run: npm run build
