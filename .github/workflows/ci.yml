name: CI

on:
  push:
    branches: ["**"]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  api:
    name: API — tests + lint + evals
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v7
        with:
          python-version: "3.12"
          cache: pip

      - name: Install API dev deps
        working-directory: services/api
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt

      - name: Lint (ruff)
        working-directory: services/api
        run: ruff check app

      - name: Unit tests
        working-directory: services/api
        env:
          MEMORYOPS_STORAGE: memory
        run: pytest -q

      - name: Eval harness (invariants)
        env:
          MEMORYOPS_STORAGE: memory
        run: python evals/run_evals.py

  api-postgres:
    name: API — full suite + evals + benchmark + enforced RLS on Postgres + pgvector
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: memoryops
          POSTGRES_PASSWORD: memoryops
          POSTGRES_DB: memoryops
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U memoryops"
          --health-interval 5s --health-timeout 5s --health-retries 10
    env:
      MEMORYOPS_STORAGE: postgres
      DATABASE_URL: postgresql+psycopg://memoryops:memoryops@localhost:5432/memoryops
      PGPASSWORD: memoryops
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v7
        with:
          python-version: "3.12"
          cache: pip

      - name: Install API dev deps (+ Postgres extras)
        working-directory: services/api
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt -r requirements-postgres.txt

      - name: Apply migrations
        run: |
          for f in infra/db/migrations/*.sql; do
            echo "-- applying $f"
            psql -h localhost -U memoryops -d memoryops -v ON_ERROR_STOP=1 -f "$f"
          done

      # The full application suite exercises the real Postgres + pgvector write/read
      # path (chat, memory, audit, loops). The RLS tests additionally provision a
      # NON-superuser role and prove FORCEd row-level security blocks cross-tenant
      # reads at the database layer — meaningful only on real Postgres, since
      # superusers (the image's default role) bypass RLS.
      - name: Full test suite on Postgres (incl. enforced RLS)
        working-directory: services/api
        run: pytest -q

      - name: Verify RLS policies are FORCEd on every tenant-scoped table
        run: python scripts/check_rls_policies.py

      # Evals + benchmark honor MEMORYOPS_STORAGE, so these run the governance cases
      # against the real backend (each case truncates for a fresh stack).
      - name: Eval harness on Postgres
        run: python evals/run_evals.py

      - name: Governance benchmark on Postgres
        run: python benchmark/run_benchmark.py

  # The memory-governance benchmark also runs in its own workflow (benchmark.yml) on
  # the in-memory backend for a dedicated status badge; the api-postgres job above
  # additionally proves it passes against the real Postgres + pgvector stack.

  sdk:
    name: SDK — tests (py ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # The SDK declares requires-python >=3.10; test every supported minor.
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v7
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install deps (API for the in-process e2e fixture + SDK)
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r services/api/requirements.txt
          python -m pip install pytest httpx
          python -m pip install -e packages/memoryops-sdk

      - name: SDK tests
        working-directory: packages/memoryops-sdk
        env:
          MEMORYOPS_STORAGE: memory
          PYTHONPATH: ${{ github.workspace }}/services/api
        run: pytest -q

  web:
    name: Web — build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Node
        uses: actions/setup-node@v7
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Install
        working-directory: apps/web
        # Strict: fail if package-lock.json is out of sync rather than silently
        # regenerating it (the old `|| npm install` fallback masked lockfile drift).
        run: npm ci

      - name: Build
        working-directory: apps/web
        run: npm run build

  perf-smoke:
    name: Perf — HTTP load smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v7
        with:
          python-version: "3.12"
          cache: pip

      - name: Install API dev deps
        working-directory: services/api
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt

      # Boots the real app (in-memory, stub providers, rate-limit off) and drives a
      # small concurrency sweep. --max-error-rate 0 makes this a zero-tolerance
      # regression gate: a single unexpected HTTP 500 fails it. (At 60 requests the
      # old 0.02 threshold silently tolerated one failure — ~1.67% < 2%.) e.g. the
      # multi-memory write 500 (PR #42) showed as a ~40% error rate and fails here.
      # Keeps benchmark/perf/run_perf.py runnable.
      - name: Boot API + run load harness
        working-directory: services/api
        env:
          MEMORYOPS_STORAGE: memory
          MEMORYOPS_EMBEDDING_PROVIDER: stub
          MEMORYOPS_LLM_PROVIDER: stub
          MEMORYOPS_RATE_LIMIT_ENABLED: "false"
        run: |
          python -m uvicorn app.main:app --host 127.0.0.1 --port 8099 --log-level warning &
          SRV=$!
          for i in $(seq 1 60); do
            curl -sf http://127.0.0.1:8099/healthz >/dev/null && break || sleep 1
          done
          python ../../benchmark/perf/run_perf.py \
            --base-url http://127.0.0.1:8099 \
            --requests 60 --concurrency 1,5,10 --operations write,retrieval,chat \
            --repetitions 2 --seed-per-scenario 10 --warmup 10 \
            --max-error-rate 0 --out ../../perf-smoke.json
          RC=$?
          kill $SRV 2>/dev/null || true
          exit $RC

      - name: Upload perf-smoke results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: perf-smoke
          path: perf-smoke.json
          if-no-files-found: ignore
